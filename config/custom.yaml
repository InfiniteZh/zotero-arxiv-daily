zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: ${oc.decode:${oc.env:ZOTERO_INCLUDE_PATH,null}}
  ignore_path: ${oc.decode:${oc.env:ZOTERO_IGNORE_PATH,null}}

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

delivery:
  mode: ${oc.env:DELIVERY_MODE,feishu}

feishu:
  enabled: ${oc.decode:${oc.env:FEISHU_ENABLED,true}}
  webhook_url: ${oc.env:FEISHU_WEBHOOK_URL,null}
  bot_name: ${oc.env:FEISHU_BOT_NAME,arXiv Daily Bot}
  timeout: ${oc.decode:${oc.env:FEISHU_TIMEOUT,30}}
  max_retries: ${oc.decode:${oc.env:FEISHU_MAX_RETRIES,3}}

nanoclaw:
  enabled: ${oc.decode:${oc.env:NANOCLAW_ENABLED,true}}
  endpoint: ${oc.env:NANOCLAW_ENDPOINT,http://localhost:3000/api/paper-digests}
  token: ${oc.env:NANOCLAW_TOKEN,null}
  timeout: ${oc.decode:${oc.env:NANOCLAW_TIMEOUT,30}}
  include_full_text: ${oc.decode:${oc.env:NANOCLAW_INCLUDE_FULL_TEXT,true}}
  max_retries: ${oc.decode:${oc.env:NANOCLAW_MAX_RETRIES,3}}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: ${oc.env:OPENAI_MODEL,gpt-4o-mini}
  language: ${oc.env:LLM_LANGUAGE,English}

source:
  arxiv:
    category: ${oc.decode:${oc.env:SOURCE_ARXIV_CATEGORY,'["cs.CR","cs.SE","cs.AI","cs.CL","cs.LG","stat.ML","cs.HC","cs.CY"]'}}

executor:
  debug: ${oc.decode:${oc.env:DEBUG,false}}
  source: ['arxiv']
